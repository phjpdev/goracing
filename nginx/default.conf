server {
    listen 80;
    server_name goracing.ai www.goracing.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name goracing.ai www.goracing.ai;

    ssl_certificate /etc/letsencrypt/live/goracing.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goracing.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 300M;

    # Proxy uploads directly to backend
    location /api/uploads/ {
        rewrite ^/api(/uploads/.*)$ $1 break;
        proxy_pass http://horse-racing-betting-backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # All other requests to frontend
    location / {
        proxy_pass http://horse-racing-betting-frontend-1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
